      - "provider"
      - "compat"
      - "device"
      - "image-recovery-update"
      - "hardware-evidence"
      - "release-governance"
    status_source:
      kind: "json-conditions"
      path: "out/validation/audit-evidence-report.json"
      conditions:
        - field: "summary.task_count"
          minimum: 2
        - field: "summary.approval_ref_count"
          minimum: 1
        - field: "summary.observability_record_count"
          minimum: 1
        - field: "summary.audit_decisions"
          includes_all:
            - "approval-pending"
            - "approval-approved"
            - "token-issued"
        - field: "summary.covered_domains"
          includes_all:
            - "control-plane"
            - "shell"
            - "provider"
            - "compat"
            - "device"
            - "updated"
            - "hardware"
            - "release-signoff"
        - field: "domain_evidence.updated.event_kinds"
          includes_all:
            - "update.apply.completed"
            - "update.rollback.completed"
            - "recovery.bundle.exported"
        - field: "domain_evidence.release-signoff.status_values"
          includes_all:
            - "passed"

