service_id: aios-runtimed
plane: runtime
role: inference-runtime
implementation_status: in_progress
maturity: partial_impl
current_phase: phase6
primary_language: rust
async_runtime: tokio
transport:
  primary: uds-jsonrpc
  secondary:
    - dbus
storage:
  primary: filesystem-cache
  secondary:
    - model-cache
backend_policy:
  baseline:
    - local-cpu
  optional:
    - local-gpu
    - local-npu
    - attested-remote
worker_support:
  contracts:
    - runtime-worker-v1
  transports:
    - stdio-wrapper
    - unix-socket-worker
  readiness:
    - unix-socket-presence
    - worker-contract-validation
    - backend-id-validation
  managed_backends:
    - local-gpu
    - local-npu
  managed_worker_sources:
    - env
    - hardware-profile
    - runtime-profile
  health_notes:
    - hardware_profile_id
    - backend_worker_contract
    - managed_worker_count
    - managed_worker_status
    - managed_worker_source
    - managed_worker_detail
inputs:
  - runtime_request
  - runtime_profile
  - route_profile
outputs:
  - inference_result
  - route_decision
  - budget_events
dependencies:
  requires:
    - aios-policyd
  optional:
    - gpu-provider
    - npu-provider
blockers:
  - no-vendor-gpu-runtime
  - no-vendor-npu-runtime
next_milestones:
  - integrate-vendor-gpu-runtime-on-managed-worker-path
  - define-vendor-npu-runtime-on-managed-worker-path
  - harden-observability-sink-consumers
