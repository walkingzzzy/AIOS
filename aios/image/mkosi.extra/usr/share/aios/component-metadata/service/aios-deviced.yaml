service_id: aios-deviced
plane: device
role: device-multimodal-broker
implementation_status: in_progress
maturity: partial_impl
current_phase: phase5
primary_language: rust
async_runtime: tokio
transport:
  primary: uds-jsonrpc
  secondary:
    - dbus
    - portal
storage:
  primary: transient-objects
  secondary:
    - sessiond-refs
    - indicator-state
    - backend-state
conditional_capabilities:
  - ui_tree
  - advanced-screencast
  - continuous-audio-capture
  - input-capture
inputs:
  - device_events
  - capture_requests
outputs:
  - normalized_multimodal_objects
  - device_state
dependencies:
  requires:
    - aios-policyd
    - aios-sessiond
  optional:
    - shell-stack
    - portal-provider
blockers:
  - no-formal-native-portal-pipewire-input-backends
  - no-formal-ui-tree-stack
next_milestones:
  - promote-native-live-probes-into-continuous-capture-backends
  - promote backend-status prototype to formal shell surface
  - keep-expanding-multimodal-smoke-and-probe-coverage
