blockers:
  - blocker: "image-level CI 已建立，但真实安装介质 / 硬件重启证据仍不足"
    impact: "已有本地 bootable image、recovery image、installer-media / cross-reboot、delivery / firstboot / updated validation suite，`system-delivery-validation` 已 16/16 通过，且支持矩阵/兼容矩阵/Release Notes 模板已冻结，但整机发行级闭环仍缺"
    mitigation: "继续扩展安装介质、boot、first-boot、recovery 与 update 硬件验证"
  - blocker: "image 构建的默认 overlay 同步策略仍有 `host-bin-dir` fallback"
    impact: "当前 Linux/x86_64 宿主在 `docker buildx` 可用时已优先走 container-native delivery，但完整镜像产线仍保留 `host-bin-dir` 回退路径，尚未做到纯容器内原生可重复构建"
    mitigation: "继续收敛 Linux/x86_64 二进制产线并压缩 `host-bin-dir` 仅剩应急回退用途"
  - blocker: "shell 正式形态仍未落地"
    impact: "chooser / approval UI / recovery surface 已有 prototype/panel skeleton 与 desktop host，compositor 也已补上 nested input routing、slot-based panel layout/hit-testing，以及 path/command 双通路的 panel snapshot bridge，但仍无正式 GUI / compositor 与完整 panel embedding"
    mitigation: "维持 broker/handle 与 shellctl/desktop host 先行，后补正式 GUI / compositor"
  - blocker: "formal provider runtime 覆盖不足"
    impact: "已有 `system-files-provider`、`device-metadata-provider`、`runtime-local-inference-provider`、shell control provider、screen capture provider、registry lifecycle smoke 与 compat runtime smoke，但更多正式 provider 仍缺"
    mitigation: "继续补更多正式 provider runtimes 与 worker contracts"
  - blocker: "device / update 仍缺发行级 backend"
    impact: "`deviced` 已有 native probe 通路，`updated` 已有 `bootctl` / `firmware` restart smoke，但正式 portal / PipeWire / libinput / camera backend 与真实平台 backend 仍缺"
    mitigation: "继续补原生 backend 与实机级验证"
