[Distribution]
Distribution=fedora
Release=42
Architecture=x86-64

[Output]
Format=disk
Output=aios-qemu-x86_64
OutputDirectory=mkosi.output

[Build]
BuildDirectory=mkosi.builddir
CacheDirectory=mkosi.cache
Incremental=yes
ToolsTree=yes
ToolsTreeDistribution=fedora
ToolsTreeRelease=42

[Content]
Bootable=yes
Bootloader=systemd-boot
Packages=
  kernel-core
  dracut
  systemd
  systemd-boot-unsigned
  qemu-guest-agent
  sqlite
  bash
  coreutils
  util-linux
  iproute
  iputils
  procps-ng
  less
  nano
  selinux-policy-targeted
  policycoreutils
  policycoreutils-python-utils
  bubblewrap
  audit
  libseccomp
KernelCommandLine=
  console=ttyS0
  systemd.log_level=info
  systemd.unit=multi-user.target
  security=selinux
  selinux=1
