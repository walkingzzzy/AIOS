# Smithay-aligned compositor baseline.
# Linux runtime prefers a nested winit + GLES renderer/backend when available.
service_id = aios-shell-compositor
desktop_host = gtk
session_backend = smithay-wayland-frontend
compositor_backend = winit
seat_name = aios-shell
pointer_enabled = true
keyboard_enabled = true
touch_enabled = false
keyboard_layout = us
keyboard_repeat_delay_ms = 200
keyboard_repeat_rate = 25
placeholder_surfaces = launcher,task-surface,approval-panel,portal-chooser,notification-center,recovery-surface,capture-indicators,remote-governance,device-backend-status
# Optional shell snapshot bridge:
# panel_bridge_socket = /tmp/aiospb.sock
# panel_snapshot_path = /tmp/aios-shell-desktop.json
# panel_snapshot_command = python3 /path/to/aios/shell/runtime/shell_session.py snapshot --json
# panel_action_command = python3 /path/to/aios/shell/runtime/shell_panel_host_bridge.py --profile /path/to/profile.json
# panel bridge socket is preferred when available; command/path remain fallback paths
# panel_action_log_path = /tmp/aios-shell-panel-actions.jsonl
# panel_snapshot_refresh_ticks = 10
# Linux DRM/KMS path:
# compositor_backend = drm-kms
# drm_device_path = /dev/dri/card0
# drm_disable_connectors = false
tick_ms = 25
