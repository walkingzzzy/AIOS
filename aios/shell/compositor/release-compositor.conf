# Release-oriented Smithay compositor configuration for Linux real-machine bring-up.
# This profile targets DRM/KMS + libseat + GBM/EGL rather than the nested winit baseline.
service_id = aios-shell-compositor-release
desktop_host = gtk
session_backend = smithay-wayland-frontend
compositor_backend = drm-kms
seat_name = aios-shell
pointer_enabled = true
keyboard_enabled = true
touch_enabled = true
keyboard_layout = us
keyboard_repeat_delay_ms = 200
keyboard_repeat_rate = 25
panel_slots = launcher,task-surface,approval-panel,portal-chooser,notification-center,recovery-surface,capture-indicators,remote-governance,device-backend-status
# Optional overrides for real hardware:
# drm_device_path = /dev/dri/card0
# drm_preferred_connector = HDMI-A-1
# drm_output_width = 1920
# drm_output_height = 1080
# drm_output_refresh_millihz = 60000
# panel_bridge_socket = /run/aios/shell/panel-bridge.sock
# panel_snapshot_command = python3 /usr/libexec/aios-shell/runtime/shell_session.py snapshot --json
# panel_action_command = python3 /usr/libexec/aios-shell/runtime/shell_panel_host_bridge.py --profile /etc/aios/shell/release-shell-profile.yaml
# panel_action_log_path = /var/lib/aios/shell/panel-action-events.jsonl
# window_state_path = /var/lib/aios/shell/compositor/release-windows.json
runtime_lock_path = /run/aios/shell/compositor/release.lock
runtime_ready_path = /run/aios/shell/compositor/release-ready.json
runtime_state_path = /var/lib/aios/shell/compositor/release-state.json
runtime_state_refresh_ticks = 1
panel_snapshot_refresh_ticks = 4
drm_disable_connectors = false
workspace_toplevel_mode = fullscreen
workspace_count = 4
default_workspace_index = 0
output_layout_mode = horizontal
window_state_path = /var/lib/aios/shell/compositor/release-windows.json
tick_ms = 16

