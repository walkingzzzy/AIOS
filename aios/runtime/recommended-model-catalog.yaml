    capabilities:
      - "text-generation"
    formats:
      - "gguf"
    aliases:
      - "phi-4-mini"
    distribution_strategy: "preload"
    recommended_modes:
      - "local"
    sources:
      - kind: "preload-image"
        value: "vendor-image-slot"
        display: "由厂商镜像预置"
  - model_id: "bge-small-en-v1-5"
    display_name: "BGE Small EN v1.5"
