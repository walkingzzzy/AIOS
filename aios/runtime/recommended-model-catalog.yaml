schema_version: "1.0.0"
catalog_id: "aios-official-recommended-models"
catalog_label: "AIOS Official Recommended Models"
models:
  - model_id: "qwen2-5-7b-instruct"
    display_name: "Qwen2.5 7B Instruct"
    description: "AIOS 默认推荐的本地通用对话模型，适合 system-assistant 与 task-surface。"
    capabilities:
      - "text-generation"
    formats:
      - "gguf"
    aliases:
      - "qwen2.5:7b-instruct"
      - "qwen2.5-7b-instruct"
      - "qwen2-5-7b"
    distribution_strategy: "manual-import"
    recommended_modes:
      - "local"
      - "hybrid"
    default_recommended: true
    sources:
      - kind: "local-file"
        value: "qwen2.5-7b-instruct.gguf"
